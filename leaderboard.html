<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - JobSim</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global-style.css">
    <link rel="stylesheet" href="leaderboard-style.css">
    <style>
        .icon-inline {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: middle;
            fill: currentColor;
        }
    </style>
    <script src="config.js"></script>
    <script src="theme-init.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">← Back to Game</a>
            <h1 class="nav-title"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l3 6 6 .5-4.5 4 1.5 6L12 15l-4.5 3.5 1.5-6L4.5 8.5 11 8z"/></svg></span> Global Leaderboard</h1>
            <button class="nav-logout" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="leaderboard-container">
        <!-- Filter Section -->
        <div class="filter-section">
            <h2>Filter by Field of Study</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-field="all">All Fields</button>
                <button class="filter-btn" data-field="Medicine">Medicine</button>
                <button class="filter-btn" data-field="Engineering">Engineering</button>
                <button class="filter-btn" data-field="Law">Law</button>
                <button class="filter-btn" data-field="Business">Business</button>
                <button class="filter-btn" data-field="Computer Science">Computer Science</button>
                <button class="filter-btn" data-field="Mass Communication">Mass Comm</button>
                <button class="filter-btn" data-field="Nursing">Nursing</button>
                <button class="filter-btn" data-field="Agriculture">Agriculture</button>
                <button class="filter-btn" data-field="Political Science">Political Science</button>
                <button class="filter-btn" data-field="Education">Education</button>
            </div>
        </div>

        <!-- Leaderboard Table -->
        <div class="leaderboard-table-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th class="rank">Rank</th>
                        <th class="player">Player</th>
                        <th class="field">Field</th>
                        <th class="money"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l3 6 6 .5-4.5 4 1.5 6L12 15l-4.5 3.5 1.5-6L4.5 8.5 11 8z"/></svg></span> Money</th>
                        <th class="growth"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 17h18v4H3z"/><path d="M5 13l4-7 5 5 7-8" fill="none" stroke="currentColor" stroke-width="2"/></svg></span> Growth</th>
                        <th class="stress"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5c0 2.76 2 5 5 7 3-2 5-4.24 5-7a5 5 0 0 0-5-5z"/><path d="M12 14v8"/></svg></span> Stress</th>
                        <th class="days"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg></span> Days</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr class="loading-row">
                        <td colspan="7">Loading leaderboard...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Your Rank -->
        <div class="your-rank-section">
            <h2>Your Position</h2>
            <div class="your-rank-card" id="yourRankCard">
                <div class="rank-info">
                    <span class="rank-position">#--</span>
                    <div class="rank-details">
                        <p class="rank-name">Not on leaderboard yet</p>
                        <p class="rank-field">Keep playing to earn your spot!</p>
                    </div>
                </div>
                <div class="rank-stats">
                    <span class="stat"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l3 6 6 .5-4.5 4 1.5 6L12 15l-4.5 3.5 1.5-6L4.5 8.5 11 8z"/></svg></span> ₦--</span>
                    <span class="stat"><span class="icon-inline" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 17h18v4H3z"/><path d="M5 13l4-7 5 5 7-8" fill="none" stroke="currentColor" stroke-width="2"/></svg></span> --</span>
                </div>
            </div>
        </div>

        <!-- Navigation Links -->
        <div class="leaderboard-nav">
            <a href="profile.html" class="nav-link">← My Profile</a>
            <a href="achievements.html" class="nav-link">Achievements →</a>
        </div>
    </div>

    <script src="leaderboard-script.js"></script>
</body>
</html>
