<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSim Abuja - 30 Day Business Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global-style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Icons Background -->
    <div class="floating-icons-container" id="floating-icons-container"></div>

    <div class="header"></div>
    <div class="container"></div>
    <script src="script.js"></script>

    <script>
        // Generate floating icons background
        function createFloatingIcons() {
            const container = document.getElementById('floating-icons-container');
            const icons = ['📱', '💼', '📊', '🎯', '⚡', '🏆', '💡', '🚀', '📈', '✨', '🎓', '🔥'];
            const iconCount = 10;

            for (let i = 0; i < iconCount; i++) {
                const icon = document.createElement('div');
                icon.className = 'floating-icon';
                icon.textContent = icons[Math.floor(Math.random() * icons.length)];
                icon.style.left = Math.random() * 100 + '%';
                icon.style.top = Math.random() * 100 + '%';
                icon.style.animationDuration = (Math.random() * 10 + 15) + 's';
                icon.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(icon);
            }
        }

        document.addEventListener('DOMContentLoaded', createFloatingIcons);
    </script>
</body>
</html>
