<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSim - 30 Day Business Simulation</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="config.js"></script>

<body>
    <div class="top-nav" style="display: flex; justify-content: center; gap: 12px; background: #111; padding: 10px; position: sticky; top: 0; z-index: 100;">

        <button onclick="apiCheckLifeCycle();" style="background:#4caf50;color:#fff;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;">⚙️ Check Life Status</button>

    <div class="container"></div>
