<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSim - Sign In / Sign Up</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <!-- Floating Icons Background -->
    <div class="floating-icons-container" id="floating-icons-container"></div>

    <!-- 3D Perspective Container -->
    <div class="perspective-wrapper">
        <!-- Character on the Left -->
        <div class="character-container">
            <img id="character-image" class="character-image" src="https://humaaans.com/avatars?img=sitting_1" alt="Character">
            <div class="status-bubble" id="status-bubble">
                <p>Welcome to JobSim!</p>
            </div>
        </div>

        <!-- Main Login Container with 3D Tilt -->
        <div class="login-container" id="login-container">
        <div class="login-card">
            <!-- Logo/Title -->
            <div class="login-header">
                <h1> JobSim</h1>
                <p class="subtitle">Your 30-Day Business Sim</p>
            </div>

            <!-- Auth Form -->
            <div class="auth-form">
                <!-- Sign Up Form (Hidden by default) -->
                <div id="signup-form" class="form-section hidden">
                    <h2>Create Account</h2>
                    
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="Enter your name" required>
                        <small id="name-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" required>
                        <small id="signup-email-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="field-of-study">Field of Study</label>
                        <select id="field-of-study" required>
                            <option value="">-- Select Your Field --</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Law">Law</option>
                            <option value="Business">Business</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mass Communication">Mass Communication</option>
                            <option value="Nursing">Nursing</option>
                            <option value="Agriculture">Agriculture</option>
                            <option value="Political Science">Political Science</option>
                            <option value="Education">Education</option>
                        </select>
                        <small id="field-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="At least 6 characters" required>
                        <small id="password-error" class="error-text"></small>
                    </div>

                    <button id="signup-btn" class="btn btn-primary">Sign Up</button>
                    <p class="toggle-text">
                        Already have an account? 
                        <a href="#" id="to-login">Sign In</a>
                    </p>
                </div>

                <!-- Sign In Form (Shown by default) -->
                <div id="login-form" class="form-section">
                    <h2>Welcome Back</h2>

                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required>
                        <small id="login-email-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                        <small id="login-password-error" class="error-text"></small>
                    </div>

                    <button id="login-btn" class="btn btn-primary">Sign In</button>
                    <p class="toggle-text">
                        Don't have an account? 
                        <a href="#" id="to-signup">Sign Up</a>
                    </p>
                </div>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Google Auth -->
            <button id="google-btn" class="btn btn-google">
                <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <!-- Loading Spinner -->
            <div id="loading-spinner" class="spinner hidden"></div>

            <!-- Status Message -->
            <div id="status-message" class="status-message hidden"></div>
        </div>
    </div>
    </div>

    <!-- Firebase SDK (Compat version via CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="login-script.js"></script>
</body>
</html>
