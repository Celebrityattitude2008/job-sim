<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSim - Sign In / Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global-style.css">
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <!-- 3D Perspective Container -->
    <div class="perspective-wrapper">
        <!-- Character on the Left -->
        <div class="character-container">
            <img id="character-image" class="character-image" src="logo.jpg" alt="JobSim Character">
            <div class="status-bubble" id="status-bubble">
                <p>Welcome to JobSim!</p>
            </div>
        </div>

        <!-- Main Login Container with 3D Tilt -->
        <div class="login-container" id="login-container">
        <div class="login-card">
            <!-- Logo/Title -->
            <div class="login-header">
                <h1> JobSim</h1>
                <p class="subtitle">Your 30-Day Business Sim</p>
            </div>

            <!-- Auth Form -->
            <div class="auth-form">
                <!-- Sign Up Form (Hidden by default) -->
                <div id="signup-form" class="form-section hidden">
                    <h2>Create Account</h2>
                    
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="Enter your name" required>
                        <small id="name-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" required>
                        <small id="signup-email-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="field-of-study">Field of Study</label>
                        <select id="field-of-study" required>
                            <option value="">-- Select Your Field --</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Law">Law</option>
                            <option value="Business">Business</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mass Communication">Mass Communication</option>
                            <option value="Nursing">Nursing</option>
                            <option value="Agriculture">Agriculture</option>
                            <option value="Political Science">Political Science</option>
                            <option value="Education">Education</option>
                        </select>
                        <small id="field-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="At least 6 characters" required>
                        <small id="password-error" class="error-text"></small>
                    </div>

                    <button id="signup-btn" class="btn btn-primary">Sign Up</button>
                    <p class="toggle-text">
                        Already have an account? 
                        <a href="#" id="to-login">Sign In</a>
                    </p>
                </div>

                <!-- Sign In Form (Shown by default) -->
                <div id="login-form" class="form-section">
                    <h2>Welcome Back</h2>

                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required>
                        <small id="login-email-error" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                        <small id="login-password-error" class="error-text"></small>
                    </div>

                    <button id="login-btn" class="btn btn-primary">Sign In</button>
                    <p class="toggle-text">
                        Don't have an account? 
                        <a href="#" id="to-signup">Sign Up</a>
                    </p>
                </div>
            </div>



            <!-- Loading Spinner -->
            <div id="loading-spinner" class="spinner hidden"></div>

            <!-- Status Message -->
            <div id="status-message" class="status-message hidden"></div>
        </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
